<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>京东惠选 · 仪表台</title>
<style>
:root {
  --bg:#080b12; --card:#111622; --border:#1e2433; --text:#e8ecf1;
  --muted:#5a6072; --red:#f0434b; --orange:#f07b3f; --green:#2dd4a8;
  --blue:#5b9cf5; --gold:#f5a623;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::selection{background:var(--blue);color:#fff}

/* Header */
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-size:20px}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:0.3px}
.topbar-right{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--muted)}
.topbar-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.btn-refresh{background:var(--blue);border:none;color:#fff;padding:7px 16px;border-radius:6px;font-size:13px;cursor:pointer;transition:opacity .2s}
.btn-refresh:hover{opacity:.85}
.btn-refresh:active{transform:scale(.96)}

/* Layout */
.main{padding:28px}
.grid{max-width:1320px;margin:0 auto}

/* KPI Row */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 24px;position:relative;overflow:hidden;transition:border-color .3s}
.kpi:hover{border-color:var(--blue)}
.kpi::after{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;border-radius:50%;opacity:.06}
.kpi.actual::after{background:var(--green)}
.kpi.estimate::after{background:var(--orange)}
.kpi.products::after{background:var(--blue)}
.kpi.rate::after{background:var(--gold)}
.kpi-icon{font-size:28px;margin-bottom:10px}
.kpi-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
.kpi-value{font-size:32px;font-weight:700;letter-spacing:-1px;line-height:1}
.kpi-value.muted{color:var(--muted)}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:6px}

/* Section */
.section{margin-bottom:32px}
.section-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}

/* Table */
.tbl{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.tbl table{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:14px 20px;font-size:11px;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.015)}
.tbl td{padding:14px 20px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.03)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover{background:rgba(255,255,255,0.02)}
.tbl .rank{color:var(--muted);font-weight:600;width:40px}
.tbl .name{font-weight:500;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tbl .price{color:var(--red);font-weight:600}
.tbl .comm{color:var(--orange);font-weight:600}
.tbl .badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:600;letter-spacing:0.3px}
.tbl .badge-hot{background:rgba(240,123,63,.15);color:var(--orange)}

/* Progress */
.progress{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:14px}
.progress-bar{height:100%;border-radius:3px;transition:width .6s}
.progress-bar.green{background:var(--green)}
.progress-bar.blue{background:var(--blue)}

/* Log */
.log{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 22px;max-height:180px;overflow-y:auto;font-size:12px;font-family:"SF Mono","Menlo",monospace;color:var(--muted);line-height:1.8}
.log .ok{color:var(--green)}
.log .warn{color:var(--orange)}
.log .err{color:var(--red)}
.log .ts{color:var(--muted);opacity:.5;margin-right:8px}

/* Status row */
.status-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px}
.project-card.active{border-color:rgba(45,212,168,.3)}
.project-name{font-size:15px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.project-meta{display:flex;gap:28px;font-size:13px}
.project-meta-item{text-align:center}
.project-meta-val{font-size:18px;font-weight:700}
.project-meta-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:3px;letter-spacing:0.5px}

@media(max-width:768px){
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .status-row{grid-template-columns:1fr}
  .main{padding:16px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">🛒</span>
    <span class="topbar-title">京东惠选 · 仪表台</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-dot"></span>
    <span id="clock">--</span>
    <button class="btn-refresh" onclick="loadAll()">🔄 刷新数据</button>
  </div>
</div>

<div class="main"><div class="grid">

  <!-- KPI Cards -->
  <div class="kpi-row">
    <div class="kpi actual">
      <div class="kpi-icon">💰</div>
      <div class="kpi-label">实际收入</div>
      <div class="kpi-value muted" id="actual-income">¥0.00</div>
      <div class="kpi-sub">京东联盟真实订单</div>
    </div>
    <div class="kpi estimate">
      <div class="kpi-icon">📊</div>
      <div class="kpi-label">预估计佣金</div>
      <div class="kpi-value" id="total-commission">—</div>
      <div class="kpi-sub">展示商品佣金总和</div>
    </div>
    <div class="kpi products">
      <div class="kpi-icon">📦</div>
      <div class="kpi-label">在线商品</div>
      <div class="kpi-value" id="product-count">—</div>
      <div class="kpi-sub">每日 9:00 自动刷新</div>
      <div class="progress"><div class="progress-bar blue" style="width:80%"></div></div>
    </div>
    <div class="kpi rate">
      <div class="kpi-icon">📈</div>
      <div class="kpi-label">平均佣金率</div>
      <div class="kpi-value" id="avg-rate">—</div>
      <div class="kpi-sub" id="top-product-name">—</div>
    </div>
  </div>

  <!-- Product Ranking -->
  <div class="section">
    <div class="section-hd">
      <span class="section-title">🏆 高佣商品排行</span>
      <span style="font-size:12px;color:var(--muted)" id="data-time"></span>
    </div>
    <div class="tbl">
      <table>
        <thead><tr><th>#</th><th>商品名称</th><th>券后价</th><th>佣金率</th><th>预估佣金</th><th></th></tr></thead>
        <tbody id="product-table">
          <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--muted)">加载中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Project Status -->
  <div class="status-row">
    <div class="project-card active">
      <div class="project-name">🛒 京东惠选 <span class="badge badge-hot" style="font-size:10px">运行中</span></div>
      <div class="project-meta">
        <div class="project-meta-item"><div class="project-meta-val">jd-hx</div><div class="project-meta-lbl">域名</div></div>
        <div class="project-meta-item"><div class="project-meta-val" id="pj-products">—</div><div class="project-meta-lbl">商品</div></div>
        <div class="project-meta-item"><div class="project-meta-val">36</div><div class="project-meta-lbl">SEO文章</div></div>
        <div class="project-meta-item"><div class="project-meta-val">9:00</div><div class="project-meta-lbl">刷新</div></div>
      </div>
    </div>
    <div class="project-card" style="opacity:.35">
      <div class="project-name">📦 待启动项目</div>
      <div class="project-meta"><div class="project-meta-item"><div class="project-meta-val">—</div><div class="project-meta-lbl">状态</div></div></div>
    </div>
  </div>

  <!-- Log -->
  <div class="section">
    <div class="section-hd"><span class="section-title">📋 运行日志</span></div>
    <div class="log" id="log"></div>
  </div>

</div></div>

<script>
function T(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}
setInterval(function(){document.getElementById('clock').textContent=T()},1000)
document.getElementById('clock').textContent=T()

function L(t,m){var l=document.getElementById('log');l.innerHTML='<div><span class="ts">'+T()+'</span><span class="'+t+'">'+m+'</span></div>'+l.innerHTML}

async function loadAll(){
  L('ok','🔄 正在拉取京东联盟实时数据…')
  try{
    var r=await fetch('data.json?t='+Date.now())
    var d=await r.json()
    
    // KPIs
    document.getElementById('total-commission').textContent='¥'+d.total_commission.toLocaleString()
    document.getElementById('product-count').textContent=d.product_count
    document.getElementById('avg-rate').textContent=d.avg_rate+'%'
    document.getElementById('pj-products').textContent=d.product_count
    document.getElementById('data-time').textContent='更新于 '+d.updated
    
    if(d.top5&&d.top5.length>0){
      document.getElementById('top-product-name').textContent=d.top5[0].name.substring(0,18)+'…'
    }
    
    // Actual income — kept at ¥0 until real orders come
    document.getElementById('actual-income').textContent='¥0.00'
    
    // Product table
    var tb=document.getElementById('product-table')
    tb.innerHTML=d.top5.map(function(p,i){
      var b=''
      if(p.rate>=30)b='<span class="badge badge-hot">超高佣</span>'
      else if(p.rate>=15)b='<span class="badge badge-hot" style="background:rgba(45,212,168,.15);color:var(--green)">高佣</span>'
      return'<tr><td class="rank">'+(i+1)+'</td><td class="name" title="'+p.name+'">'+p.name+'</td><td class="price">¥'+p.price.toLocaleString()+'</td><td>'+p.rate+'%</td><td class="comm">¥'+p.commission.toFixed(2)+'</td><td>'+b+'</td></tr>'
    }).join('')
    
    // Check real orders (only if VPN/network available)
    try{
      var or=await fetch('orders.json?t='+Date.now())
      if(or.ok){
        var od=await or.json()
        if(od.total>0){
          document.getElementById('actual-income').textContent='¥'+od.commission.toFixed(2)
          document.getElementById('actual-income').classList.remove('muted')
          L('ok','💰 真实订单: '+od.total+'单 · ¥'+od.commission.toFixed(2))
        }
      }
    }catch(e){}
    
    L('ok','✅ 数据刷新完成 · 商品 '+d.product_count+' 件')
  }catch(e){
    L('err','❌ 加载失败: '+e.message)
  }
}

L('ok','仪表台启动')
loadAll()
setInterval(loadAll,300000)
</script>
</body>
</html>
